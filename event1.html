<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인정보 제3자 제공 동의</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand': '#4D12EE'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-lg max-w-md w-full overflow-hidden" id="consentContainer" style="display: none;">
  <div class="bg-gray-100 p-5 text-center">
    <h1 class="text-lg font-semibold text-black">개인정보 제3자 제공 동의</h1>
  </div>

  <div class="p-6">
    <div id="errorMessage" class="text-red-500 text-center mb-5 text-sm" style="display: none;"></div>

    <div class="bg-gray-50 border-2 border-gray-200 rounded-xl p-5 mb-6 leading-relaxed">
      <div class="mb-3 text-sm text-black">
        <span class="font-semibold text-black">[제공받는 자]</span>(주)아영FBC
      </div>
      <div class="mb-3 text-sm text-black">
        <span class="font-semibold text-black">[이용 목적]</span>회원 서비스 제공 및 프로모션 안내
      </div>
      <div class="mb-3 text-sm text-black">
        <span class="font-semibold text-black">[제공 항목]</span>이름, 생년월일, 휴대전화, 아이디, 이메일
      </div>
      <div class="text-sm text-black">
        <span class="font-semibold text-black">[보유 기간]</span>수집일로부터 1년
      </div>
    </div>

    <div class="bg-gray-50 border-l-4 border-gray-400 p-4 mb-6 text-sm text-black leading-relaxed">
      귀하께서는 동의하지 않을 권리가 있습니다.<br>
      동의 거부 시 해당 서비스 이용이 제한될 수 있습니다.
    </div>

    <div class="mb-6">
      <label class="flex items-center space-x-3 cursor-pointer">
        <div class="relative">
          <input type="checkbox" id="agree" class="sr-only" onchange="toggleConfirmButton()">
          <div class="w-5 h-5 border-2 border-gray-300 rounded flex items-center justify-center transition-all duration-200 checkbox-custom">
            <svg class="w-3 h-3 text-white hidden check-mark" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
            </svg>
          </div>
        </div>
        <span class="text-sm text-black">동의함</span>
      </label>
    </div>

    <button id="confirmBtn" class="w-full py-4 bg-gray-300 text-gray-500 rounded-xl text-base font-semibold cursor-not-allowed transition-all duration-200" disabled onclick="handleConfirm()">
      확인
    </button>
  </div>
</div>

<script>
  let encryptedUserData = null;

  function initializePage() {
    try {
      const urlParams = new URLSearchParams(window.location.search);
      const encodedData = urlParams.get('data');

      if (!encodedData) {
        const currentDomain = window.location.hostname;
        const rootUrl = `${window.location.protocol}//${currentDomain}`;
        window.location.href = rootUrl;
        return;
      }

      encryptedUserData = encodedData;

      document.getElementById('consentContainer').style.display = 'block';
      console.log('암호화된 데이터 수신 완료');
    } catch (error) {
      showError('페이지 초기화 중 오류가 발생했습니다.');
      console.error('Error:', error);
    }
  }

  function showError(message) {
    const errorElement = document.getElementById('errorMessage');
    if (errorElement) {
      errorElement.textContent = message;
      errorElement.style.display = 'block';
    }
  }

  function toggleConfirmButton() {
    const agreeCheckbox = document.getElementById('agree');
    const confirmBtn = document.getElementById('confirmBtn');
    const checkboxCustom = document.querySelector('.checkbox-custom');
    const checkMark = document.querySelector('.check-mark');

    if (agreeCheckbox.checked) {
      checkboxCustom.style.backgroundColor = '#4D12EE';
      checkboxCustom.style.borderColor = '#4D12EE';
      checkMark.classList.remove('hidden');

      confirmBtn.disabled = false;
      confirmBtn.className = 'w-full py-4 text-white rounded-xl text-base font-semibold cursor-pointer transition-all duration-200 transform hover:-translate-y-0.5';
      confirmBtn.style.backgroundColor = '#4D12EE';
    } else {
      checkboxCustom.style.backgroundColor = '';
      checkboxCustom.style.borderColor = '';
      checkMark.classList.add('hidden');

      confirmBtn.disabled = true;
      confirmBtn.className = 'w-full py-4 bg-gray-300 text-gray-500 rounded-xl text-base font-semibold cursor-not-allowed transition-all duration-200';
      confirmBtn.style.backgroundColor = '';
    }
  }

  function handleConfirm() {
    const agreeCheckbox = document.getElementById('agree');

    if (!agreeCheckbox.checked) {
      showError('동의 여부를 선택해주세요.');
      return;
    }

    if (!encryptedUserData) {
      showError('데이터가 없습니다.');
      return;
    }

    try {
      window.location.href = `https://www.winenara.com/custom/otherLogin/login_check?data=${encryptedUserData}`;

    } catch (error) {
      showError('데이터 처리 중 오류가 발생했습니다.');
      console.error('Error:', error);
    }
  }

  window.onload = initializePage;
</script>
</body>
</html>
